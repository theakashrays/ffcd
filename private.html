	// When on a profile's message page (e.g. 1_private.html), load profile avatar and name from the profile page (e.g. 1.html)
	function getSlugFromPrivatePage() {
		var path = (window.location.pathname || '').replace(/^\//, '');
		var match = path.match(/^([^/]+)_private\.html$/);
		return match ? match[1] : null;

		var slug = getSlugFromPrivatePage();
		if (!slug) return;
		var profileUrl = slug + '.html';
		fetch(profileUrl).then(function(r) { return r.ok ? r.text() : null; }).then(function(html) {
			if (!html) return;
			var parser = new DOMParser();
			var doc = parser.parseFromString(html, 'text/html');
			var avatarImg = doc.querySelector('.profile_avatar img');
			var nameEl = doc.querySelector('.usernamefont .style10') || doc.querySelector('.usernamefont span[class*="style"]');
			var name = nameEl ? nameEl.textContent.trim() : '';
			var avatarEl = document.getElementById('pm-header-avatar');
			var nameHeader = document.getElementById('pm-header-name');
			var breadcrumb = document.getElementById('pm-breadcrumb-name');
			if (avatarImg && avatarEl) {
				var src = avatarImg.getAttribute('src') || avatarImg.src;
				if (src) {
					if (!src.startsWith('data:') && !src.startsWith('http')) {
						var base = profileUrl.includes('/') ? profileUrl.replace(/[^/]+$/, '') : '';
						src = (base || '') + src.replace(/^\.\//, '');
					}
					avatarEl.src = src;
					avatarEl.onerror = function() { this.src = 'assets/ogu_favicon_15a80e3a.png'; };
				}
			}
			if (name) {
				if (nameHeader) nameHeader.textContent = name;
				if (breadcrumb) breadcrumb.textContent = name.toUpperCase();
			}
		}).catch(function() {});
	}
	loadProfileIntoMessageHeader();

	var params = new URLSearchParams(location.search);
	var nameParam = params.get('name') || params.get('with');
	if (nameParam && nameParam.trim()) {
		var n = nameParam.trim();
		var bread = document.getElementById('pm-breadcrumb-name');
		var head = document.getElementById('pm-header-name');
		if (bread) bread.textContent = n.toUpperCase();
		if (head) head.textContent = n;
	}
	function getReceiverName() {
		var el = document.getElementById('pm-header-name');
		return el ? el.textContent.trim() : '';
	}
	var threadEl = document.getElementById('message-thread');
	var inputEl = document.getElementById('message-input');
	var sendBtn = document.getElementById('send-btn');
	function renderThread() {
		var receiver = getReceiverName();
		if (!receiver) { threadEl.innerHTML = '<p style="color:#9c9c9c;">Select a conversation or use ?name=Username in the URL.</p>'; return; }
		fetch('/api/messages').then(function(r){ return r.ok ? r.json() : []; }).then(function(messages) {
			var withMe = messages.filter(function(m) {
				var other = m.sender === 'me' ? m.receiver : m.sender;
				return other.toLowerCase() === receiver.toLowerCase();
			});
			withMe.sort(function(a,b){ return new Date(a.timestamp) - new Date(b.timestamp); });
			if (withMe.length === 0) { threadEl.innerHTML = '<p style="color:#9c9c9c;">No messages yet. Send one below.</p>'; return; }
			threadEl.innerHTML = withMe.map(function(m) {
				var isMe = m.sender === 'me';
				var who = isMe ? 'You' : m.sender;
				var time = new Date(m.timestamp).toLocaleString();
				return '<div style="margin-bottom:12px;padding:8px;background:' + (isMe ? '#252525' : '#1f1f1f') + ';border-radius:6px;"><strong style="color:#a4a4a4;">' + who + '</strong> <span style="color:#787878;font-size:12px;">' + time + '</span><div style="color:#e0e0e0;margin-top:4px;">' + (m.text || '').replace(/</g,'&lt;') + '</div></div>';
			}).join('');
			threadEl.scrollTop = threadEl.scrollHeight;
		}).catch(function(){ threadEl.innerHTML = '<p style="color:#9c9c9c;">Could not load messages.</p>'; });
	}
	function sendMessage() {
		var text = (inputEl && inputEl.value) ? inputEl.value.trim() : '';
		var receiver = getReceiverName();
		if (!text || !receiver) return;
		var msg = { sender: 'me', receiver: receiver, text: text, timestamp: new Date().toISOString() };
		fetch('/api/messages', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(msg) })
			.then(function(r) { if (r.ok) { inputEl.value = ''; renderThread(); } });
	}
	if (sendBtn) sendBtn.onclick = sendMessage;
	if (inputEl) inputEl.onkeydown = function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
	renderThread();
})();
</script>
</body>
</html><!-- end: member_profile -->
